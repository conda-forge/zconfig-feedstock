schema_version: 1

context:
  name: ZConfig
  version: 4.3

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name|lower }}-${{ version }}.tar.gz
  sha256: 472233e515fa29be6c873e78b8a2b450c2cd25d0133cb45960837f33f1ab4fe3

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv
  python:
    entry_points:
      - zconfig = ZConfig.validator:main
      - zconfig_schema2html = ZConfig.schema2html:main

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - ZConfig
        - ZConfig.components
        - ZConfig.components.basic
        - ZConfig.components.basic.tests
        - ZConfig.components.logger
        - ZConfig.components.logger.tests
        - ZConfig.tests
        - ZConfig.tests.library
        - ZConfig.tests.library.thing
        - ZConfig.tests.library.widget
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - zconfig_schema2html -h
      - pip check

about:
  license: ZPL-2.1
  license_file: LICENSE.txt
  summary: Structured Configuration Library
  homepage: http://www.zope.org/Members/fdrake/zconfig/
  repository: https://github.com/zopefoundation/ZConfig

extra:
  recipe-maintainers:
    - jan-janssen
